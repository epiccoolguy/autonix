name: Daily flake.lock update

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: daily-flake-lock-update
  cancel-in-progress: false

jobs:
  update:
    name: Update flake.lock
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.status.outputs.changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Restore Nix download cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/nix
          key: ${{ runner.os }}-nix-cache-${{ hashFiles('flake.lock') }}
          restore-keys: |
            ${{ runner.os }}-nix-cache-

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Update flake.lock with age filter
        run: python3 scripts/update_flake_lock.py --lockfile flake.lock --min-age-hours 24

      - name: Detect changes
        id: status
        shell: bash
        run: |
          if git diff --quiet -- flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Upload updated lockfile
        if: steps.status.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: updated-flake-lock
          path: flake.lock
          if-no-files-found: error

  validate:
    name: Validate updated flake
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: macos-latest
    steps:
      - name: Check out update branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download updated lockfile
        uses: actions/download-artifact@v8
        with:
          name: updated-flake-lock
          path: .

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run flake checks
        run: nix flake check

      - name: Build darwin configurations
        shell: bash
        run: |
          set -euo pipefail
          for host in tests-Virtual-Machine Miguels-MacBook-Air MPCE-MBP-HKDC2N1VJ4; do
            nix build ".#darwinConfigurations.${host}.system"
          done

  create_pr:
    name: Open pull request
    needs:
      - update
      - validate
    if: needs.update.outputs.changed == 'true' && needs.validate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download updated lockfile
        uses: actions/download-artifact@v8
        with:
          name: updated-flake-lock
          path: .

      - name: Commit and push bot branch
        shell: bash
        env:
          BRANCH: bot/daily-flake-lock-update
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [[ "$BRANCH" == "$BASE_BRANCH" ]]; then
            echo "Refusing to push: automation branch equals default branch ($BASE_BRANCH)."
            exit 1
          fi

          if [[ "$BRANCH" != bot/* ]]; then
            echo "Refusing to push: automation branch must start with bot/."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add flake.lock
          git commit -m "chore: daily flake.lock update"
          git push --force-with-lease --set-upstream origin "$BRANCH"

      - name: Create pull request
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: bot/daily-flake-lock-update
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          existing_pr=$(gh pr list --head "$BRANCH" --base "$BASE_BRANCH" --state open --json number --jq '.[0].number')

          if [[ -n "$existing_pr" ]]; then
            echo "Pull request already exists: #$existing_pr"
            exit 0
          fi

          gh pr create \
            --head "$BRANCH" \
            --base "$BASE_BRANCH" \
            --title "chore: daily flake.lock update" \
            --body "Automated daily flake.lock refresh with a 24-hour age filter."
