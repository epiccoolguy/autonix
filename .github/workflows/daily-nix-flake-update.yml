name: Daily nix flake update

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: daily-nix-flake-update
  cancel-in-progress: false

jobs:
  update:
    name: Update flake.lock
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.status.outputs.changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Restore Nix download cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/nix
          key: ${{ runner.os }}-nix-cache-${{ hashFiles('flake.lock') }}
          restore-keys: |
            ${{ runner.os }}-nix-cache-

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Update flake.lock
        run: nix flake update

      - name: Detect changes
        id: status
        shell: bash
        run: |
          if git diff --quiet -- flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Upload updated lockfile
        if: steps.status.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: updated-flake-lock
          path: flake.lock
          if-no-files-found: error

  validate:
    name: Validate updated flake
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: macos-latest
    permissions:
      actions: write
    steps:
      - name: Check out update branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download updated lockfile
        uses: actions/download-artifact@v8
        with:
          name: updated-flake-lock
          path: .

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-macos: 8G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: P2D
          purge-primary-key: never

      - name: Run flake checks
        shell: bash
        run: |
          set -euo pipefail
          nix flake check 2>&1 | tee validate.log

      - name: Build darwin configurations
        shell: bash
        run: |
          set -euo pipefail
          for host in tests-Virtual-Machine Miguels-MacBook-Air MPCE-MBP-HKDC2N1VJ4; do
            nix build ".#darwinConfigurations.${host}.system" 2>&1 | tee -a validate.log
          done

      - name: Extract nix warnings
        shell: bash
        run: |
          set -euo pipefail
          grep -E '(^|[[:space:]])warning:[[:space:]]' validate.log | awk '!seen[$0]++' > nix-warnings.txt || true

      - name: Upload nix warnings
        uses: actions/upload-artifact@v7
        with:
          name: nix-warnings
          path: nix-warnings.txt
          if-no-files-found: error

  create_pr:
    name: Open pull request
    needs:
      - update
      - validate
    if: needs.update.outputs.changed == 'true' && needs.validate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download updated lockfile
        uses: actions/download-artifact@v8
        with:
          name: updated-flake-lock
          path: .

      - name: Download nix warnings
        uses: actions/download-artifact@v8
        with:
          name: nix-warnings
          path: .

      - name: Commit, push and open pull request
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: bot/daily-nix-flake-update
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          NIX_WARNINGS_FILE: nix-warnings.txt
        run: python3 scripts/create_pr.py
